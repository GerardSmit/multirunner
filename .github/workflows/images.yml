name: images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Linux runner + cache server images (multi-arch: amd64 + arm64).
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3      # arm64 emulation
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: gerardsmit
          password: ${{ secrets.DOCKER_PAT }}

      - name: Runner image metadata
        id: meta-runner
        uses: docker/metadata-action@v5
        with:
          images: gerardsmit/multirunner-runner-linux
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,enable=${{ github.ref_type != 'tag' }}

      - name: Build + push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/linux/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-runner.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cache server image metadata
        id: meta-cache
        uses: docker/metadata-action@v5
        with:
          images: gerardsmit/multirunner-cacheserver
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,enable=${{ github.ref_type != 'tag' }}

      - name: Build + push cache server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/cacheserver/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-cache.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Windows runner image (amd64 only; Server 2025 / ltsc2025 process isolation).
  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: gerardsmit
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build + push windows runner image
        shell: bash
        run: |
          set -euo pipefail
          IMG=gerardsmit/multirunner-runner-windows
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VER="${GITHUB_REF_NAME#v}"
            docker build -f images/windows/Dockerfile -t "$IMG:$VER" -t "$IMG:latest" .
            docker push "$IMG:$VER"
            docker push "$IMG:latest"
          else
            SHA="$(git rev-parse --short HEAD)"
            docker build -f images/windows/Dockerfile -t "$IMG:sha-$SHA" .
            docker push "$IMG:sha-$SHA"
          fi
